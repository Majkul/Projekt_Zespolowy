worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 60M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting ────────────────────────────────────────────
    # General request limit — 20 req/s per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    # Strict limit for login/register endpoints — 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    # Payment webhook — 30 req/s (PayU can retry quickly)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 30;

    upstream app {
        server app:5000;
        keepalive 32;
    }

    # ── HTTP — redirect to HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff          always;
        add_header X-Frame-Options           SAMEORIGIN       always;
        add_header X-XSS-Protection          "1; mode=block"  always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Auth endpoints — strict rate limit
        location ~* ^/(Account/Login|Account/Register) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Connection        "";
        }

        # PayU webhook — relaxed limit, no burst queueing
        location /Payment/Notify {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # Static uploads — cached, general rate limit
        location /uploads/ {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://app;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # Everything else — general rate limit
        location / {
            limit_req zone=general burst=40 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Connection        "";
            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;
        }
    }
}
